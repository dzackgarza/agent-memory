    - human-input-needed
    - accepted-local-claim
  - name: uncertaintyNotes
    type: text
  - name: reportArtifacts
    type: string_list
  - name: failedExplorations
    type: string_list
  - name: successCriteria
    type: string_list
    required: true
  - name: complexity
    type: number
    min: 0
    max: 100
  - name: commit
    type: string
  - name: tags
    type: string_list
