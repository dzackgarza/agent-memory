# Repo-owned configuration: edit triggers and `with:` values directly.
# All review behavior lives upstream in the referenced workflows.
name: PR Review
'on':
  pull_request: {}

jobs:
  deterministic-diff:
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
    with:
      gate: deterministic-diff
      profile: python

  general:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: general
      scope: diff

  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
    with:
      report_type: slop
      scope: diff

  thread-resolution:
    needs:
      - general
      - slop
    uses: dzackgarza/ai-review-ci/.github/workflows/_gates.yml@main
    permissions:
      contents: read
      pull-requests: read
    with:
      gate: thread-resolution
      profile: python
